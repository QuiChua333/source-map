<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản Đồ Tương Tác - Tour Ninh Chữ - Vĩnh Hy | Viet Sun Travel</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.0/mapbox-gl.js"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Cấu hình Tailwind (màu thương hiệu + animation) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Be Vietnam Pro', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',
                            500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a',950:'#172554'
                        }
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        scaleIn: {
                            '0%': { opacity: '0', transform: 'scale(0.95) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        }
                    },
                    animation: {
                        fadeIn: 'fadeIn 0.25s ease-out',
                        scaleIn: 'scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1)'
                    }
                }
            }
        }
    </script>

    <!-- CSS riêng của ứng dụng -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-slate-100 antialiased text-slate-800">

    <div class="flex flex-col lg:flex-row h-[100dvh] w-screen overflow-hidden">

        <!-- ============================ SIDEBAR ============================ -->
        <aside id="sidebar" class="w-full lg:w-[34%] xl:w-[28%] 2xl:w-[24%] h-[48dvh] lg:h-full flex flex-col bg-white shadow-2xl z-10">

            <!-- Header (nền ảnh Vịnh Vĩnh Hy + lớp phủ tối cho chữ nổi) -->
            <header class="app-header relative text-white px-4 py-4 sm:px-6 sm:py-5 shadow-lg shrink-0">
                <div class="flex items-center gap-3 mb-1.5 sm:mb-2 pr-9">
                    <div class="bg-white/20 backdrop-blur-sm w-9 h-9 sm:w-11 sm:h-11 rounded-xl flex items-center justify-center text-lg sm:text-xl shrink-0">
                        <i class="fa-solid fa-route"></i>
                    </div>
                    <div>
                        <p class="text-[10px] sm:text-[11px] font-medium tracking-wider text-brand-100 uppercase">Viet Sun Travel</p>
                        <h1 class="text-base sm:text-lg font-extrabold leading-tight drop-shadow">Ninh Chữ - Vĩnh Hy</h1>
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-x-4 gap-y-1 text-xs sm:text-sm text-white/90 mt-2 sm:mt-3 drop-shadow">
                    <span><i class="fa-regular fa-calendar-days mr-1.5"></i>Đêm 13 – 15/8/2026</span>
                    <span><i class="fa-solid fa-users mr-1.5"></i>Đoàn Vina Takeuchi</span>
                </div>
                <p class="hidden sm:block text-[11px] text-white/80 mt-2 italic drop-shadow">Company Trip 2026 · Chạm Miền Biển Ngọc</p>

                <!-- Nút thu gọn sidebar -->
                <button onclick="toggleSidebar()" title="Ẩn lịch trình"
                    class="absolute top-2.5 right-2.5 w-8 h-8 rounded-lg bg-white/20 hover:bg-white/35 backdrop-blur-sm flex items-center justify-center text-white transition">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </header>

            <!-- Bộ lọc bật/tắt tuyến -->
            <div class="flex flex-wrap items-center justify-center gap-x-3 gap-y-2 px-3 sm:px-6 py-2.5 sm:py-3 bg-slate-50 border-b border-slate-200 shrink-0">
                <span class="text-[11px] text-slate-400 font-medium">Hiện tuyến:</span>
                <button id="toggle-go" onclick="toggleLeg('go')" class="leg-toggle" title="Bật/tắt tuyến đi">
                    <span class="w-5 h-1.5 rounded-full bg-blue-600"></span> Lượt đi
                </button>
                <button id="toggle-back" onclick="toggleLeg('back')" class="leg-toggle" title="Bật/tắt tuyến về">
                    <span class="w-5 h-1.5 rounded-full bg-orange-500"></span> Lượt về
                </button>
            </div>

            <!-- Timeline list (render bởi js/ui.js) -->
            <div id="timeline" class="flex-1 overflow-y-auto custom-scroll px-4 sm:px-5 py-4 sm:py-5 space-y-4 sm:space-y-5"></div>

            <!-- Footer -->
            <footer class="px-4 sm:px-6 py-2.5 sm:py-3 bg-slate-50 border-t border-slate-200 text-center text-[10px] sm:text-[11px] text-slate-400 shrink-0">
                © 2026 Viet Sun Travel · Gala "Bước Đệm Vững Vàng – Tăng Tốc Tương Lai"
            </footer>
        </aside>

        <!-- ============================ MAP ============================ -->
        <main id="map-main" class="flex-1 relative h-[52dvh] lg:h-full min-h-0">
            <div id="map"></div>

            <!-- Nút mở lại sidebar (hiện khi đã thu gọn) -->
            <button id="sidebar-open" onclick="toggleSidebar()" title="Hiện lịch trình" style="display:none;"
                class="absolute top-3 left-3 z-30 w-10 h-10 rounded-xl bg-white shadow-lg flex items-center justify-center text-brand-700 hover:bg-brand-50 transition">
                <i class="fa-solid fa-list-ul"></i>
            </button>

            <!-- Loading overlay -->
            <div id="map-loading" class="absolute inset-0 bg-slate-100 flex flex-col items-center justify-center z-20">
                <i class="fa-solid fa-earth-asia text-5xl text-brand-500 animate-spin" style="animation-duration:3s"></i>
                <p class="mt-4 text-slate-500 font-medium">Đang tải bản đồ lộ trình...</p>
            </div>
        </main>
    </div>

    <!-- ============================ MODAL CHI TIẾT ============================ -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-3 sm:p-4">
        <!-- Backdrop -->
        <div id="modal-backdrop" class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm animate-fadeIn"></div>

        <!-- Modal box -->
        <div class="relative bg-white w-full max-w-2xl max-h-[92dvh] rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-scaleIn">

            <!-- Modal header -->
            <div class="relative bg-gradient-to-r from-brand-700 to-brand-600 px-4 py-4 sm:px-6 sm:py-5 text-white shrink-0">
                <div class="flex items-start gap-3 pr-10">
                    <div id="modal-num" class="shrink-0 w-9 h-9 sm:w-10 sm:h-10 rounded-full bg-white/20 backdrop-blur flex items-center justify-center font-bold text-base sm:text-lg">1</div>
                    <div>
                        <h2 id="modal-title" class="text-lg sm:text-xl font-extrabold leading-tight">Tiêu đề</h2>
                        <p id="modal-time" class="text-brand-100 text-xs sm:text-sm mt-0.5"><i class="fa-regular fa-clock mr-1"></i>Thời gian</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="absolute top-3 right-3 sm:top-4 sm:right-4 w-9 h-9 rounded-full bg-white/15 hover:bg-white/30 transition flex items-center justify-center text-white">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <!-- Modal body -->
            <div class="overflow-y-auto custom-scroll p-4 sm:p-6">
                <!-- Gallery grid -->
                <div id="modal-gallery" class="grid grid-cols-2 gap-2.5 sm:gap-3 mb-4 sm:mb-5 rounded-xl overflow-hidden"></div>

                <!-- Mô tả chi tiết -->
                <div class="prose prose-slate max-w-none">
                    <h3 class="text-sm font-bold text-brand-700 uppercase tracking-wide mb-2">
                        <i class="fa-solid fa-circle-info mr-1.5"></i>Thông tin chi tiết
                    </h3>
                    <div id="modal-desc" class="text-slate-600 leading-relaxed text-sm sm:text-[15px]"></div>
                </div>
            </div>

            <!-- Modal footer: điều hướng điểm trước / sau (căn phải) -->
            <div class="px-4 py-3 sm:px-6 sm:py-4 bg-slate-50 border-t border-slate-200 flex items-center justify-end gap-2 shrink-0">
                <button id="modal-prev" title="Điểm trước" class="modal-nav"><i class="fa-solid fa-chevron-left"></i></button>
                <button id="modal-next" title="Điểm sau" class="modal-nav"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- ============================ SCRIPTS (thứ tự quan trọng) ============================ -->
    <script src="js/config.js"></script> <!-- 0. Token Mapbox (không commit lên Git) -->
    <script src="js/data.js"></script>   <!-- 1. Dữ liệu tour -->
    <script src="js/map.js"></script>    <!-- 2. Logic bản đồ Mapbox -->
    <script src="js/ui.js"></script>     <!-- 3. Sidebar + Modal, khởi chạy initMap() -->

</body>
</html>
